<!doctype html>
<html>
	<head>
		<link rel="stylesheet" href="index.css">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
	</head>
	<body>
		<header>
			<ul>
				<li>
					<p class="header-title">WeBarelyWork</p>
				</li>
				<li>
					<img class="logo" src="images/pin.png">
				</li>
				<li  class="menu">
					<img src="images/burger.png">
				</li>
			</ul>
		</header>
		<h1>The best coworking spaces for lazy devs</h1>
		<main>
			<section>
				<div class="hero-section">
					<p class="exclusive">Exclusive</p>
					<img src="images/hygge.jpg">
				</div>
				<div class="caption">
					<p>Skiving in Scandinavia? Relax with a latte
						at Hygge Lounge</p>
					<button class="book-btn">Book</button>
				</div>
			</section>
			<section>
				<div class="hero-section">
					<img src="images/sky-garden.jpg">
				</div>
				<div class="caption">
					<p>Bored in Barcelona? Take a siesta at 
						the Sky Garden</p>
					<button class="book-btn">Book</button>
				</div>
			</section>
			<section>
				<div class="hero-section">
					<img src="images/generator.jpg">
				</div>
				<div class="caption">
					<p>Relaxing in Rio? Take some 
						downtime at the Generator Hub</p>
					<button class="book-btn">Book</button>
				</div>
			</section>
		</main>
		<div class="message-bubble">
			<img src="images/message.png">
		</div>
	</body>
</html>
